<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Shuffle Tool</title>

<style>
  body {
    margin: 0;
    font-family: "Segoe UI", Arial;
    background: linear-gradient(135deg, #1e1e2f, #2b2b45);
    color: white;
  }

  h1 {
    text-align: center;
    margin: 30px 0;
  }

  .top-btn {
    display: block;
    margin: 0 auto 30px auto;
    padding: 15px 25px;
    border: none;
    border-radius: 12px;
    background: #6c63ff;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
  }

  .top-btn:hover {
    background: #5a52e0;
    transform: scale(1.05);
  }

  .container {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 20px;
    flex-wrap: wrap;
  }

  .card {
    background: #2f2f4a;
    padding: 20px;
    border-radius: 16px;
    width: 300px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  }

  h3 {
    margin-top: 0;
  }

  textarea {
    width: 100%;
    height: 180px;
    border-radius: 10px;
    border: none;
    padding: 10px;
    resize: none;
    font-size: 14px;
    margin-bottom: 10px;
  }

  .btn {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border: none;
    border-radius: 10px;
    background: #4cafef;
    color: white;
    cursor: pointer;
    transition: 0.2s;
  }

  .btn:hover {
    background: #3a9bdc;
    transform: scale(1.03);
  }

  .copy {
    background: #00c896;
  }

  .copy:hover {
    background: #00a87d;
  }

  .output {
    margin-top: 15px;
    background: #1e1e2f;
    padding: 10px;
    border-radius: 10px;
    min-height: 120px;
    white-space: pre-line;
    font-size: 14px;
  }
</style>
</head>

<body>

<h1>🎲 Doppel Shuffler</h1>

<button class="top-btn" onclick="generateBoth()">Beide Listen mischen</button>

<div class="container">

  <div class="card">
    <h3>Liste 1</h3>
    <textarea id="input1" placeholder="Namen eingeben..."></textarea>
    <button class="btn" onclick="generate('1')">Mischen</button>
    <button class="btn copy" onclick="copyText('output1')">Kopieren</button>
    <div class="output" id="output1"></div>
  </div>

  <div class="card">
    <h3>Liste 2</h3>
    <textarea id="input2" placeholder="Namen eingeben..."></textarea>
    <button class="btn" onclick="generate('2')">Mischen</button>
    <button class="btn copy" onclick="copyText('output2')">Kopieren</button>
    <div class="output" id="output2"></div>
  </div>

</div>

<script>
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function generate(id) {
  let input = document.getElementById("input" + id).value.trim();
  let names = input.split("\n").filter(n => n.trim() !== "");

  let shuffled = shuffle(names);

  let result = shuffled.map((name, i) => {
    return (i + 1) + ". " + name;
  }).join("\n");

  document.getElementById("output" + id).textContent = result;
}

function generateBoth() {
  generate("1");
  generate("2");
}

function copyText(id) {
  let text = document.getElementById(id).textContent;
  if (!text) return alert("Nichts zum Kopieren!");

  navigator.clipboard.writeText(text);
  alert("Kopiert!");
}
</script>

</body>
</html>
