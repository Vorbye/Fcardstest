<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantasia Randomiser</title>

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  font-family: "Segoe UI", Arial;
  background: radial-gradient(circle at top, #2b2b45, #1e1e2f);
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 30px 20px 10px;
  font-size: 32px;
  font-weight: bold;
}

/* MAIN LAYOUT */
.wrapper {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

/* BUTTON */
.top-btn {
  display: block;
  margin: 20px auto 40px;
  padding: 15px 25px;
  border-radius: 12px;
  border: none;
  background: #6c63ff;
  color: white;
  cursor: pointer;
  font-size: 16px;
  transition: 0.2s;
}

.top-btn:hover {
  transform: scale(1.05);
  background: #5a52e0;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 30px;
}

/* CARD */
.card {
  background: rgba(47,47,74,0.8);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* TEXTAREA */
textarea {
  width: 100%;
  height: 160px;
  border-radius: 10px;
  border: none;
  padding: 10px;
  margin-bottom: 10px;
  font-size: 14px;
}

/* BUTTONS */
.btn {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: #4cafef;
  color: white;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.03);
}

.copy {
  background: #00c896;
}

/* OUTPUT */
.output {
  margin-top: 15px;
  background: #1a1a2a;
  padding: 10px;
  border-radius: 10px;
  min-height: 120px;
  white-space: pre-line;
}

/* SEED */
.seed {
  font-size: 11px;
  opacity: 0.6;
  margin-top: 8px;
  word-break: break-all;
}

/* LINKS */
.links {
  display: flex;
  justify-content: center;
  gap: 25px;
  margin: 60px 0 30px;
  flex-wrap: wrap;
}

.link-btn {
  padding: 14px 26px;
  border-radius: 14px;
  text-decoration: none;
  color: white;
  font-weight: bold;
  background: linear-gradient(135deg, #ff7a18, #ffb347);
  box-shadow: 0 0 15px rgba(255,122,24,0.6);
  transition: 0.25s;
}

.link-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 25px rgba(255,122,24,1);
}
</style>
</head>

<body>

<header>🧙‍♂️🎩 Fantasia Randomiser</header>

<div class="wrapper">

<button class="top-btn" onclick="generateBoth()">🎲 Beide Listen mischen</button>

<div class="container">

  <div class="card">
    <h3>Liste 1</h3>
    <textarea id="input1"></textarea>
    <button class="btn" onclick="generate('1')">Mischen</button>
    <button class="btn copy" onclick="copyText('output1')">Kopieren</button>
    <div class="output" id="output1"></div>
    <div class="seed" id="seed1"></div>
  </div>

  <div class="card">
    <h3>Liste 2</h3>
    <textarea id="input2"></textarea>
    <button class="btn" onclick="generate('2')">Mischen</button>
    <button class="btn copy" onclick="copyText('output2')">Kopieren</button>
    <div class="output" id="output2"></div>
    <div class="seed" id="seed2"></div>
  </div>

</div>

<div class="links">
  <a href="https://fantasiacards.de" target="_blank" class="link-btn">🃏 FantasiaCards</a>
  <a href="https://fantasiasports.de" target="_blank" class="link-btn">⚽ FantasiaSports</a>
</div>

</div>

<script>
function secureRandom() {
  const array = new Uint32Array(1);
  crypto.getRandomValues(array);
  return array[0] / 2**32;
}

function shuffle(arr) {
  let seed = [];
  for (let i = arr.length - 1; i > 0; i--) {
    let r = secureRandom();
    let j = Math.floor(r * (i + 1));
    seed.push(r.toFixed(8));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return { arr, seed };
}

function animate(el, text) {
  let dots = 0;
  let interval = setInterval(() => {
    el.textContent = "Mischen" + ".".repeat(dots);
    dots = (dots + 1) % 4;
  }, 120);

  setTimeout(() => {
    clearInterval(interval);
    el.textContent = text;
  }, 700);
}

function generate(id) {
  let input = document.getElementById("input" + id).value.trim();
  let names = input.split("\n").filter(n => n);

  let result = shuffle(names);
  let output = result.arr.map((n,i)=>`${i+1}. ${n}`).join("\n");

  animate(document.getElementById("output"+id), output);
  document.getElementById("seed"+id).textContent =
    "Seed: " + result.seed.join(" | ");
}

function generateBoth() {
  generate("1");
  generate("2");
}

function copyText(id) {
  let text = document.getElementById(id).textContent;
  if (!text) return alert("Nichts zum Kopieren!");
  navigator.clipboard.writeText(text);
  alert("Kopiert!");
}
</script>

</body>
</html>
