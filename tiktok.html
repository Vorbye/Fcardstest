<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Fantasia Randomiser PRO</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial;
  background: #1e1e2f;
  color: white;
}

header {
  text-align: center;
  padding: 25px;
  font-size: 28px;
  font-weight: bold;
}

.top-btn {
  display: block;
  margin: 0 auto 20px;
  padding: 15px 25px;
  border-radius: 12px;
  border: none;
  background: #6c63ff;
  color: white;
  cursor: pointer;
}

.container {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
}

.card {
  background: #2f2f4a;
  padding: 20px;
  border-radius: 16px;
  width: 300px;
}

textarea {
  width: 100%;
  height: 150px;
  border-radius: 10px;
  padding: 10px;
}

.output {
  margin-top: 15px;
  background: #1a1a2a;
  padding: 10px;
  border-radius: 10px;
  min-height: 120px;
  white-space: pre-line;
}

.seed {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>🧙‍♂️🎩 Fantasia Randomiser PRO</header>

<button class="top-btn" onclick="generateBoth()">🎲 Beide Listen mischen</button>

<div class="container">
  <div class="card">
    <textarea id="input1"></textarea>
    <div class="output" id="output1"></div>
    <div class="seed" id="seed1"></div>
  </div>

  <div class="card">
    <textarea id="input2"></textarea>
    <div class="output" id="output2"></div>
    <div class="seed" id="seed2"></div>
  </div>
</div>

<script>
// 🔐 Kryptografischer Zufall
function secureRandom() {
  const array = new Uint32Array(1);
  crypto.getRandomValues(array);
  return array[0] / 2**32;
}

// 🔀 Shuffle mit sicherem Zufall
function shuffle(arr) {
  let seed = [];
  
  for (let i = arr.length - 1; i > 0; i--) {
    let r = secureRandom();
    let j = Math.floor(r * (i + 1));

    seed.push(r.toFixed(8)); // speichert Zufallswerte

    [arr[i], arr[j]] = [arr[j], arr[i]];
  }

  return { arr, seed };
}

// 🎲 Animation
function animateOutput(element, finalText) {
  let dots = 0;
  let interval = setInterval(() => {
    element.textContent = "Mischen" + ".".repeat(dots);
    dots = (dots + 1) % 4;
  }, 100);

  setTimeout(() => {
    clearInterval(interval);
    element.textContent = finalText;
  }, 800);
}

function generate(id) {
  let input = document.getElementById("input" + id).value.trim();
  let names = input.split("\n").filter(n => n);

  let result = shuffle(names);

  let outputText = result.arr.map((n, i) => `${i+1}. ${n}`).join("\n");

  animateOutput(document.getElementById("output" + id), outputText);

  document.getElementById("seed" + id).textContent =
    "Seed: " + result.seed.join(" | ");
}

function generateBoth() {
  generate("1");
  generate("2");
}
</script>

</body>
</html>
