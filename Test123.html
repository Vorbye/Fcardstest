<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantasia Randomiser</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  min-height: 100%;
  font-family: "Segoe UI", Arial;
  background: radial-gradient(circle at top, #2b2b45, #1e1e2f);
  color: white;
}

header {
  text-align: center;
  padding: 30px 20px 10px;
  font-size: 32px;
  font-weight: bold;
}

.links {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 20px;
}

.link-btn {
  padding: 12px 22px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  font-weight: bold;
  background: linear-gradient(135deg, #ff7a18, #ffb347);
  box-shadow: 0 0 12px rgba(255,122,24,0.6);
}

.wrapper {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.top-btn {
  display: block;
  margin: 20px auto 40px;
  padding: 15px 25px;
  border-radius: 12px;
  border: none;
  background: #6c63ff;
  color: white;
  cursor: pointer;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 30px;
}

.card {
  background: rgba(47,47,74,0.85);
  padding: 20px;
  border-radius: 18px;
}

textarea {
  width: 100%;
  height: 150px;
  border-radius: 10px;
  padding: 10px;
}

.btn {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: #4cafef;
  color: white;
}

.copy { background: #00c896; }
.delete { background: #ff4d4d; }

.output {
  margin-top: 15px;
  background: #1a1a2a;
  padding: 10px;
  border-radius: 10px;
  min-height: 120px;
  white-space: pre-line;
}

.seed, .count {
  font-size: 12px;
  margin-top: 8px;
  opacity: 0.7;
}

/* 🍀 POPUP */
.popup {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: #2f2f4a;
  border-radius: 16px;
  padding: 15px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  color: white;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.3s ease;
}

.popup img {
  width: 50px;
  height: 50px;
}

.popup.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<header>🎲 Fantasia Randomiser 🎲</header>

<div class="links">
  <a href="https://fantasiacards.de" target="_blank" class="link-btn">🃏 FantasiaCards</a>
  <a href="https://fantasiasports.de" target="_blank" class="link-btn">⚽ FantasiaSports</a>
</div>

<div class="wrapper">

<button class="top-btn" onclick="generateBoth()">🎲 Beide Listen mischen</button>

<div class="container">

<div class="card">
<h3>Liste 1</h3>
<textarea id="input1"></textarea>
<button class="btn" onclick="generate('1')">Mischen</button>
<button class="btn copy" onclick="copyText('output1')">Kopieren</button>
<button class="btn delete" onclick="clearAll('1')">🗑️ Löschen</button>
<div class="output" id="output1"></div>
<div class="seed" id="seed1"></div>
<div class="count" id="count1">Gemischt: 0x</div>
</div>

<div class="card">
<h3>Liste 2</h3>
<textarea id="input2"></textarea>
<button class="btn" onclick="generate('2')">Mischen</button>
<button class="btn copy" onclick="copyText('output2')">Kopieren</button>
<button class="btn delete" onclick="clearAll('2')">🗑️ Löschen</button>
<div class="output" id="output2"></div>
<div class="seed" id="seed2"></div>
<div class="count" id="count2">Gemischt: 0x</div>
</div>

</div>
</div>

<!-- 🍀 POPUP -->
<div id="popup" class="popup">
  <img src="https://i.imgur.com/nYTf77x.png">
  <div>
    <strong>Kopiert!</strong><br>
    Viel Glück an alle Teilnehmer!
  </div>
</div>

<script>
let shuffleCount={1:0,2:0};
const API_KEY="72e761eb-e5bd-4fdf-b4a5-89fbe02bbcc8";

async function getRandomNumbers(count){
  try{
    const res=await fetch("https://api.random.org/json-rpc/4/invoke",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        jsonrpc:"2.0",
        method:"generateIntegers",
        params:{apiKey:API_KEY,n:count,min:0,max:1000000},
        id:Date.now()
      })
    });
    const data=await res.json();
    return data.result.random.data;
  }catch{return null;}
}

async function shuffle(arr){
  let numbers=await getRandomNumbers(arr.length);
  if(!numbers) numbers=arr.map(()=>Math.floor(Math.random()*1000000));

  for(let i=arr.length-1;i>0;i--){
    let j=numbers[i]%(i+1);
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

async function generate(id){
  let input=document.getElementById("input"+id).value.trim();
  let names=input.split("\n").filter(n=>n);

  let shuffled=await shuffle(names);
  let output=shuffled.map((n,i)=>`${i+1}. ${n}`).join("\n");

  document.getElementById("output"+id).textContent=output;

  shuffleCount[id]++;
  document.getElementById("count"+id).textContent="Gemischt: "+shuffleCount[id]+"x";
}

function generateBoth(){generate("1");generate("2");}

function clearAll(id){
  document.getElementById("input"+id).value="";
  document.getElementById("output"+id).textContent="";
  shuffleCount[id]=0;
  document.getElementById("count"+id).textContent="Gemischt: 0x";
}

function copyText(id){
  let text=document.getElementById(id).textContent;
  if(!text) return;
  navigator.clipboard.writeText(text);
  showPopup();
}

function showPopup(){
  let p=document.getElementById("popup");
  p.classList.add("show");
  setTimeout(()=>p.classList.remove("show"),2500);
}
</script>

</body>
</html>
